<div class="card bg-base-100 w-1/2 mx-auto p-10 shadow-xl">
    <h3 class="text-3xl text-red-500">{{greeting}} </h3>
    <ul class="list">
        @for( member of members(); track $index){
        <li class="list-row items-center">

            <img src="user.png" alt="use avatar" class="size-12 rounded-box">
            <div>
                {{member.displayName}}
            </div>

        </li>
        }
    </ul>

</div>
